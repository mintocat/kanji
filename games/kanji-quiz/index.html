<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字当てクイズ - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #kanji-stage {
            width: 300px;
            height: 300px;
            background: #fff;
            border: 5px double #8b0000;
            margin: 20px auto;
        }
        svg { width: 100%; height: 100%; }
        path { fill: none; stroke: #333; stroke-width: 3; stroke-linecap: round; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字当てクイズ</h1>
        <div id="kanji-stage">
            <svg id="quiz-svg" viewBox="0 0 109 109"></svg>
        </div>
        
        <div id="answer-zone">
            <input type="text" id="answer-input" placeholder="熟語を答えろ！">
            <button id="submit-btn">決定</button>
        </div>

        <p id="message">準備ができたら開始ボタンを押してください</p>
        <button id="start-btn">ゲーム開始</button>
        <br>
        <button onclick="location.href='../../index.html'">ホームへ戻る</button>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
