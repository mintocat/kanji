<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字当てクイズ - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #kanji-stage { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 220px; }
        .kanji-box { width: 150px; height: 150px; background: white; border: 3px solid #8b0000; border-radius: 8px; }
        svg { width: 100%; height: 100%; }
        path { fill: none; stroke: #333; stroke-width: 3; stroke-linecap: round; }
        #announcement { height: 30px; color: #8b0000; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
        #name-setup { background: rgba(139, 0, 0, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #8b0000; }
        #display-my-name { font-weight: bold; color: #8b0000; }
        #correct-word-display { font-size: 2.5rem; color: #ff0000; margin: 10px 0; letter-spacing: 0.5rem; font-weight: bold; }
        #lobby-ui { text-align: center; margin-top: 20px; }
        .lobby-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; background: white; border-radius: 8px; }
        #player-list-area { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 5px; font-size: 0.9rem; }
        .player-tag { display: inline-block; background: #8b0000; color: white; padding: 2px 8px; border-radius: 15px; margin: 2px; }
        /* 勝ち数用のバッジ */
        .win-count { background: #ffd700; color: #000; font-weight: bold; padding: 0 5px; border-radius: 5px; margin-left: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字当てクイズ</h1>

        <div id="lobby-ui">
            <div id="name-setup">
                <p>現在の名前: <span id="lobby-my-name">未設定</span></p>
                <input type="text" id="name-input" placeholder="あなたの名前を入力">
                <button id="save-name-btn">名前を決定</button>
            </div>
            <div class="lobby-section">
                <h3>自分で部屋を作る</h3>
                <button id="create-room-btn">新しいルームを作成する</button>
            </div>
            <div class="lobby-section">
                <h3>友達の部屋に入る</h3>
                <input type="text" id="join-room-input" placeholder="ルームIDを入力">
                <button id="join-room-btn">ルームに入る</button>
            </div>
            <button onclick="location.href='../../index.html'">ホームへ戻る</button>
        </div>

        <div id="game-ui" class="hidden">
            <div id="room-info">
                ルーム: <span id="display-room-id">-</span> | 
                名前: <span id="display-my-name">未設定</span>
                <button onclick="location.href='../../index.html'" style="margin-left:10px;">ホームに戻る</button>
            </div>

            <div id="player-list-area">
                参加者: <span id="player-list">読み込み中...</span>
            </div>
            
            <div id="announcement"></div>
            <div id="kanji-stage"></div>
            
            <div id="play-ui" class="hidden">
                <input type="text" id="answer-input" placeholder="熟語を答えろ！">
                <button id="submit-btn">解答を送信</button>
                <hr>
                <button id="stroke-vote-btn">次の画へ（投票: <span id="stroke-vote-count">0</span>）</button>
                <p id="wait-msg" class="hidden">解答送信済み。次の画をお待ちください...</p>
            </div>

            <div id="result-ui" class="hidden">
                <h2 id="winner-msg"></h2>
                <p>正解は：</p>
                <h3 id="correct-word-display"></h3>
                <button id="next-game-btn">次のゲームへ（投票: <span id="game-vote-count">0</span>）</button>
            </div>

            <button id="start-btn" class="hidden">ゲーム開始（ホストのみ）</button>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
