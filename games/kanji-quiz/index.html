<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字当てクイズ - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #kanji-stage {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            min-height: 220px;
        }
        .kanji-box {
            width: 150px;
            height: 150px;
            background: white;
            border: 3px solid #8b0000;
            border-radius: 8px;
        }
        svg { width: 100%; height: 100%; }
        path { fill: none; stroke: #333; stroke-width: 3; stroke-linecap: round; }
        
        #announcement {
            height: 30px;
            color: #8b0000;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .hidden { display: none; }

        /* 名前入力エリアのスタイル追記 */
        #name-setup {
            background: rgba(139, 0, 0, 0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #8b0000;
        }
        #display-my-name {
            font-weight: bold;
            color: #8b0000;
        }
        #correct-word-display {
            font-size: 2.5rem;
            color: #8b0000;
            margin: 10px 0;
            letter-spacing: 0.5rem;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字当てクイズ</h1>

        <div id="name-setup">
            <input type="text" id="name-input" placeholder="あなたの名前を入力">
            <button id="save-name-btn">名前を決定</button>
        </div>

        <div id="room-info">
            ルーム: <span id="display-room-id">-</span> | 
            名前: <span id="display-my-name">未設定</span>
        </div>
        
        <div id="announcement"></div>

        <div id="kanji-stage"></div>
        
        <div id="play-ui" class="hidden">
            <input type="text" id="answer-input" placeholder="熟語を答えろ！">
            <button id="submit-btn">解答を送信</button>
            <p id="wait-msg" class="hidden">全員の解答を待っています（最大5秒）...</p>
        </div>

        <div id="result-ui" class="hidden">
            <h2 id="winner-msg"></h2>
            <p>正解は：</p>
            <h3 id="correct-word-display"></h3>
            <button id="next-game-btn">次のゲームへ</button>
        </div>

        <button id="start-btn" class="hidden">ゲーム開始（ホストのみ）</button>
        
        <br>
        <button onclick="location.href='../../index.html'">ホームへ戻る</button>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
