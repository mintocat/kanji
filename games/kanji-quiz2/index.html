<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字当てクイズ2 - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #kanji-stage { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 220px; }
        .kanji-box { width: 150px; height: 150px; background: white; border: 3px solid #8b0000; border-radius: 8px; }
        svg { width: 100%; height: 100%; }
        path { fill: none; stroke: #333; stroke-width: 3; stroke-linecap: round; }
        #announcement { height: 30px; color: #8b0000; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .hidden { display: none; }
        #name-setup { background: rgba(139, 0, 0, 0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #8b0000; }
        #correct-word-display { font-size: 2.5rem; color: #ff0000; margin: 10px 0; letter-spacing: 0.5rem; font-weight: bold; text-align: center; }
        
        #lobby-ui { text-align: center; margin-top: 20px; }
        .lobby-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; background: white; border-radius: 8px; }
        #player-list-area { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 5px; font-size: 0.9rem; text-align: center; }
        .player-tag { display: inline-block; background: #8b0000; color: white; padding: 2px 8px; border-radius: 15px; margin: 2px; }
        
        #score-board {
            position: fixed; right: 20px; top: 100px; width: 160px;
            background: white; border: 2px solid #8b0000; border-radius: 8px;
            padding: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        #score-board h3 { margin: 0 0 10px 0; font-size: 0.9rem; border-bottom: 1px solid #eee; color: #8b0000; text-align: center; }
        .score-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; border-bottom: 1px dotted #ccc; }
        
        /* 手札選択中のスタイル */
        .hand-stroke-btn.selected { 
            background: #ff0000 !important; 
            border-color: #ff0000 !important; 
            transform: scale(1.1); 
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        .hand-stroke-btn.selected svg path { stroke: white; }

        @media (max-width: 800px) {
            #score-board { position: static; width: auto; margin: 10px auto; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字当てクイズ2</h1>

        <div id="lobby-ui">
            <div id="name-setup">
                <p>現在の名前: <span id="lobby-my-name">未設定</span></p>
                <input type="text" id="name-input" placeholder="あなたの名前を入力">
                <button id="save-name-btn">名前を決定</button>
            </div>
            <div class="lobby-section">
                <h3>自分で部屋を作る</h3>
                <div style="margin-bottom: 10px;">
                    <label style="cursor: pointer; font-weight: bold;">
                        <input type="checkbox" id="gravity-mode-check"> 重心モード（画を中央に寄せる）
                    </label>
                </div>
                <button id="create-room-btn">新しいルームを作成する</button>
            </div>
            <div class="lobby-section">
                <h3>友達の部屋に入る</h3>
                <input type="text" id="join-room-input" placeholder="ルームIDを入力">
                <button id="join-room-btn">ルームに入る</button>
            </div>
            <button onclick="location.href='../../index.html'">ホームへ戻る</button>
        </div>

        <div id="game-ui" class="hidden">
            <div id="room-info" style="text-align: center; margin-bottom: 10px;">
                ルーム: <span id="display-room-id">-</span> | 
                名前: <span id="display-my-name">未設定</span>
            </div>

            <div id="player-list-area">
                参加者: <span id="player-list">読み込み中...</span>
            </div>

            <div id="score-board">
                <h3>勝ち数ランキング</h3>
                <div id="score-list"></div>
            </div>
            
            <div id="announcement"></div>
            <div id="kanji-stage"></div>
            
            <div id="play-ui" class="hidden">
                <div style="text-align: center; margin-bottom: 20px;">
                    <input type="text" id="answer-input" placeholder="熟語を答えろ！">
                    <button id="submit-btn">解答を送信</button>
                </div>
                
                <div id="turn-ui" style="margin-top: 15px; border-top: 2px solid #8b0000; padding-top: 15px; background: #fffaf0; border-radius: 8px; padding: 15px;">
                    <h3 id="turn-status" style="margin: 0 0 10px 0; font-size: 1.1rem; text-align: center;"></h3>
                    <p style="margin: 0 0 10px 0; font-size: 0.8rem; color: #666; text-align: center;">1回クリックで選択、もう1回クリックで場に出す：</p>
                    <div id="my-hand-container" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;"></div>
                </div>
                <p id="wait-msg" class="hidden" style="text-align: center; color: #8b0000;">解答送信済み...</p>
            </div>

            <div id="result-ui" class="hidden" style="text-align: center;">
                <h2 id="winner-msg"></h2>
                <p>正解は：</p>
                <h3 id="correct-word-display"></h3>
                <button id="next-game-btn">次のゲームへ（投票: <span id="game-vote-count">0</span>）</button>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button id="start-btn" class="hidden">ゲーム開始（ホストのみ）</button>
            </div>
            
            <hr style="margin-top: 30px;">
            <div style="text-align: center; margin-top: 10px;">
                <button onclick="location.href='index.html'">ロビーへ戻る</button>
                <button onclick="location.href='../../index.html'">ホームへ戻る</button>
            </div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
