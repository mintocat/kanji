<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字ラミー（仮）</title>
    <style>
        :root {
            --bg-color: #fdfaf2; /* 和紙のような白茶色 */
            --text-color: #2c2c2c; /* 墨色 */
            --border-color: #59544c;
            --accent-color: #8f2e14; /* 落ち着いた朱色 */
            --tile-bg: #ffffff;
        }

        body {
            font-family: "Yu Mincho", "MS Mincho", serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        #game-board {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 場のエリア（捨て札や完成した漢字を置く場所） */
        .area {
            border: 1px solid var(--border-color);
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.5);
            min-height: 100px;
        }
        .area-title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        /* 牌（たね）のデザイン */
        .tile-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tile {
            width: 50px;
            height: 70px;
            background-color: var(--tile-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.1s, border-color 0.1s;
        }
        .tile:hover {
            transform: translateY(-5px);
        }
        .tile.selected {
            border-color: var(--accent-color);
            border-width: 3px;
            transform: translateY(-5px);
            box-shadow: 0 0 10px rgba(143, 46, 20, 0.5);
        }

        /* ボタン類 */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            justify-content: center;
        }
        button {
            font-family: inherit;
            font-size: 1.1rem;
            padding: 10px 20px;
            cursor: pointer;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 3px;
        }
        button:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>漢字ラミー</h1>

    <div id="game-board">
        <div id="status-bar">
            <span id="deck-info">山札: 準備中...</span>
            <span id="turn-info">あなたのターン</span>
        </div>

        <div class="area" id="table-area">
            <div class="area-title">場</div>
            <div class="tile-container" id="table-tiles"></div>
        </div>

        <div class="area" id="hand-area">
            <div class="area-title">手札</div>
            <div class="tile-container" id="hand-tiles"></div>
            
            <div class="controls">
                <button id="btn-draw" onclick="drawTile()">山札から引く</button>
                <button id="btn-meld" onclick="meldKanji()" disabled>選択した牌で役を作る</button>
                <button id="btn-discard" onclick="discardTile()" disabled>選択した牌を捨てる</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
