<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        /* --- 和風ベースとフォント --- */
        body {
            background-color: #f4eee1; /* 和紙風の背景色 */
            background-image: 
                radial-gradient(#d5cba4 10%, transparent 10%),
                radial-gradient(#d5cba4 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Yu Mincho', 'Sawarabi Mincho', serif; /* 明朝体 */
        }

        #game-container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 10px; 
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        .lobby-section { margin: 15px auto; padding: 15px; border: 2px solid #8b0000; border-radius: 8px; background: #fffcfc; text-align: center; }
        .setting-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; align-items: center; }
        .setting-row input { width: 50px; text-align: center; }
        .hidden { display: none; }
        
        /* 盤面レイアウト */
        #player-status-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .player-card { padding: 5px 10px; border-radius: 4px; background: #eee; font-size: 0.85rem; border: 1px solid #ccc; }
        .active-turn { border: 2px solid #8b0000; background: #ffebee; font-weight: bold; }

        #board-area { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-bottom: 15px; }
        .area-box { padding: 10px; border-radius: 8px; border: 2px solid #333; min-height: 120px; }
        #public-area { display: flex; flex-wrap: wrap; gap: 8px; background: #fff9c4; }
        
        /* 木札風のたねカード */
        .tane-card { 
            width: 45px; height: 60px; 
            background: linear-gradient(135deg, #e6d3a5, #d2b48c); /* 木目調のグラデーション */
            border: 2px solid #6b4423;
            color: #2b1b17;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            display: inline-flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; border-radius: 4px; cursor: pointer; user-select: none;
            transition: 0.2s; position: relative;
            font-weight: bold;
        }
        /* 選択時の表示を少し落ち着いた色味に */
        .tane-card.selected { 
            background: #fff0f0 !important; 
            border-color: #ffcccc !important; 
            transform: translateY(-5px); 
            box-shadow: 0 4px 8px rgba(255,182,193,0.3); 
        }

        /* 朱印風の公開漢字 */
        .melted-kanji { 
            width: 60px; height: 60px; 
            background: #fffafa; 
            border: 2px dashed #b71c1c; /* 朱印のような赤 */
            color: #b71c1c;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; border-radius: 4px; cursor: pointer;
        }
        .melted-kanji.selected { background: #ffeb3b; border-color: #fbc02d; }

        /* 山札・捨て札 */
        .pile { width: 60px; height: 80px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        #deck-pile { background: #333; color: white; }
        #discard-pile { background: white; border: 2px solid #333; font-size: 1.8rem; }
        
        /* アクションボタンの共通デザイン */
        #action-bar { text-align: center; padding: 15px; background: #e3f2fd; border-radius: 8px; }
        #action-bar button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* 1枚捨てるボタン専用のデザイン（はっきりした色） */
        #btn-discard {
            background-color: #ffe0e0; 
            color: #b71c1c;            
            border-color: #b71c1c;      
        }

        /* ボタンが有効な時のホバー効果 */
        #action-bar button:not(:disabled):hover {
            transform: scale(1.05);
            filter: brightness(0.9);
        }

        /* ボタンが無効（disabled）の時は薄くする */
        #action-bar button:disabled {
            background-color: #eee !important;
            color: #aaa !important;
            border-color: #ccc !important;
            cursor: not-allowed;
            transform: none;
        }

        /* --- アニメーションの定義 --- */
        /* ドローした時のフワッと現れる動き */
        @keyframes drawAnim {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .anim-draw { animation: drawAnim 0.3s ease-out; }

        /* 失敗した時に画面が揺れる動き */
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .anim-shake { animation: shakeAnim 0.3s; border-color: red; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字ラミー</h1>

        <div id="lobby-ui">
            <div class="lobby-section">
                <p>名前: <strong id="lobby-my-name">...</strong></p>
                <input type="text" id="name-input" placeholder="名前を入力">
                <button id="save-name-btn">名前決定</button>
            </div>
            <div class="lobby-section">
                <h3>ルーム作成設定</h3>
                <div class="setting-row">
                    <label>初期手札: <input type="number" id="setting-hand-size" value="10"></label>
                    <label>ライフ: <input type="number" id="setting-life" value="3"></label>
                </div>
                <button id="create-room-btn">ルーム作成</button>
            </div>
            <div class="lobby-section">
                <input type="text" id="join-room-input" placeholder="IDを入力">
                <button id="join-room-btn">参戦する</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <h2 style="text-align: center;">ルームID: <span id="display-room-id"></span></h2>
            
            <div id="player-status-area"></div>
            
            <div id="board-area">
                <div class="area-box" style="background: #e8f5e9;">
                    <div style="text-align:center; font-weight:bold; margin-bottom:10px;">山 / 捨て札</div>
                    <div style="display:flex; justify-content:center; gap:15px;">
                        <div id="deck-pile" class="pile">山札</div>
                        <div id="discard-pile" class="pile">-</div>
                    </div>
                </div>
                <div id="public-area" class="area-box">
                </div>
            </div>

            <div id="action-bar">
                <div id="my-hand-container" style="margin-bottom:15px; min-height:70px;"></div>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button id="btn-melt">メルト</button>
                    <button id="btn-attach">付ける</button>
                    <button id="btn-discard">1枚捨てる</button>
                </div>
                <p id="system-msg" style="color:#8b0000; font-weight:bold; margin-top:10px;"></p>
                <button id="start-btn" class="hidden">ゲーム開始（ホスト）</button>
            </div>
        </div>
    </div>

    <audio id="se-draw" src="./se_draw.mp3"></audio>   
    <audio id="se-select" src="./se_select.mp3"></audio> 
    <audio id="se-melt" src="./se_melt.mp3"></audio>   
    <audio id="se-error" src="./se_error.mp3"></audio> 

    <script type="module" src="./script.js"></script>
</body>
</html>
