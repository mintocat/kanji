<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢の遊戯</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap');

        :root {
            --bg: #f5f2e9;
            --ink: #1a1a1a;
            --wood: #dcc8a0;
            --accent: #8e2b12;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Klee One', 'Yu Mincho', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(#e2d9c2 1px, transparent 1px);
            background-size: 20px 20px;
        }

        h1 {
            font-size: 2.5rem;
            border-bottom: 3px double var(--ink);
            margin: 20px 0;
            letter-spacing: 0.5rem;
        }

        #game-container {
            width: 90%;
            max-width: 900px;
        }

        .status {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            padding: 5px 20px;
            background: rgba(0,0,0,0.05);
            border-radius: 5px;
        }

        .area {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ccc;
            background: rgba(255,255,255,0.4);
            min-height: 120px;
            border-radius: 8px;
            position: relative;
        }

        .area-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--bg);
            padding: 0 10px;
            font-weight: bold;
            color: var(--accent);
        }

        .tile-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 牌（タイル）のデザイン */
        .tile {
            width: 50px;
            height: 70px;
            background: var(--wood);
            border: 1px solid #999;
            border-bottom: 5px solid #a38d60;
            border-right: 2px solid #a38d60;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .tile:hover { transform: translateY(-3px); }
        .tile.selected {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(142, 43, 18, 0.4);
            transform: translateY(-8px);
        }

        /* 完成した漢字 */
        .meld-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 5px;
            border: 1px solid var(--ink);
            margin-right: 10px;
        }
        .meld-kanji {
            font-size: 2.5rem;
            font-weight: bold;
            padding: 5px 15px;
            border-bottom: 1px solid #eee;
        }
        .meld-source {
            font-size: 0.8rem;
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        button {
            font-family: inherit;
            font-size: 1.1rem;
            padding: 10px 25px;
            background: var(--ink);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover { background: var(--accent); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #log {
            font-size: 0.9rem;
            height: 60px;
            overflow-y: auto;
            border-top: 1px solid #ddd;
            width: 100%;
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>漢字ラミー</h1>

    <div id="game-container">
        <div class="status">
            <div id="deck-count">山札: -- 枚</div>
            <div id="turn-display">あなたの手番</div>
        </div>

        <div class="area">
            <div class="area-label">場（完成した漢字）</div>
            <div id="table-tiles" class="tile-list"></div>
        </div>

        <div class="area">
            <div class="area-label">手札</div>
            <div id="hand-tiles" class="tile-list"></div>
        </div>

        <div class="controls">
            <button id="draw-btn" onclick="game.draw()">山札から引く</button>
            <button id="meld-btn" onclick="game.meld()" disabled>役を作る</button>
            <button id="discard-btn" onclick="game.discard()" disabled>1枚捨てる</button>
        </div>

        <div id="log"></div>
    </div>

    <script src="kanji_logic.js"></script>
    <script src="game.js"></script>
</body>
</html>
