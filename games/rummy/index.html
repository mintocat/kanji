<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        /* --- 和風ベースとフォント --- */
        body {
            background-color: #f4eee1;
            background-image: radial-gradient(#d5cba4 10%, transparent 10%), radial-gradient(#d5cba4 10%, transparent 10%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Yu Mincho', 'Sawarabi Mincho', serif;
        }

        #game-container { 
            max-width: 900px; margin: 0 auto; padding: 10px; 
            background: rgba(255, 255, 255, 0.9); box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        
        .lobby-section { margin: 15px auto; padding: 15px; border: 2px solid #8b0000; border-radius: 8px; background: #fffcfc; text-align: center; }
        .setting-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; align-items: center; }
        .setting-row input { width: 50px; text-align: center; }
        .hidden { display: none; }
        
        #player-status-area { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px; }
        .player-card { padding: 5px 10px; border-radius: 4px; background: #eee; font-size: 0.85rem; border: 1px solid #ccc; transition: all 0.5s; }
        
        /* 自分のターンの時の発光演出 */
        .active-turn { 
            border: 2px solid #8b0000; background: #ffebee; font-weight: bold; 
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
            animation: pulse-border 2s infinite;
        }

        #board-area { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-bottom: 15px; }
        .area-box { padding: 10px; border-radius: 8px; border: 2px solid #333; min-height: 120px; }
        #public-area { display: flex; flex-wrap: wrap; gap: 8px; background: #fff9c4; position: relative; }
        
        /* 木札風カード（和風グラデーション強化） */
        .tane-card { 
            width: 45px; height: 60px; 
            background: linear-gradient(145deg, #e6d3a5, #c2a173);
            border: 2px solid #5d3a1a; color: #2b1b17;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            display: inline-flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; border-radius: 4px; cursor: pointer; user-select: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: bold; margin: 2px;
        }

        /* 選択時の「浮き上がり＋光」演出 */
        .tane-card.selected { 
            background: #fffafa !important; 
            border-color: #d32f2f !important; 
            transform: translateY(-12px) scale(1.1); 
            box-shadow: 0 10px 20px rgba(211, 47, 47, 0.4); 
            z-index: 10;
        }

        /* 公開漢字の「朱印」演出 */
        .melted-kanji { 
            width: 60px; height: 60px; background: #fff; 
            border: 2px solid #b71c1c; color: #b71c1c;
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem; border-radius: 4px; cursor: pointer;
            transition: 0.3s;
        }
        .melted-kanji.selected { 
            background: #fdf2f2; border-style: double; border-width: 4px; 
            transform: scale(1.1); box-shadow: 0 0 15px rgba(183, 28, 28, 0.3);
        }

        /* 山札・捨て札 */
        .pile { width: 60px; height: 80px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #deck-pile { background: #333; color: white; box-shadow: 0 4px #000; }
        #deck-pile:active { transform: translateY(4px); box-shadow: 0 0 #000; }
        #discard-pile { background: white; border: 2px solid #333; font-size: 1.8rem; }
        
        #action-bar { text-align: center; padding: 15px; background: #e3f2fd; border-radius: 8px; }
        #action-bar button { padding: 10px 20px; font-size: 1rem; font-weight: bold; border-radius: 6px; border: 2px solid #333; cursor: pointer; transition: 0.2s; }
        #btn-discard { background-color: #ffe0e0; color: #b71c1c; border-color: #b71c1c; }
        #action-bar button:not(:disabled):hover { transform: scale(1.05); filter: brightness(0.9); }
        #action-bar button:disabled { background-color: #eee !important; color: #aaa !important; border-color: #ccc !important; cursor: not-allowed; }

        /* --- 新規アニメーション --- */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0px rgba(139, 0, 0, 0.2); }
            50% { box-shadow: 0 0 15px rgba(139, 0, 0, 0.6); }
            100% { box-shadow: 0 0 0px rgba(139, 0, 0, 0.2); }
        }

        /* ドロー時のスライドアニメ */
        @keyframes drawIn {
            0% { transform: translateX(50px) rotate(20deg); opacity: 0; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
        .anim-draw { animation: drawIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 失敗時の「震え」 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .anim-shake { animation: shake 0.4s; }

        /* 成功時の「爆発」 */
        @keyframes success-pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .anim-success { animation: success-pop 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字ラミー</h1>

        <div id="lobby-ui">
            <div class="lobby-section">
                <p>名前: <strong id="lobby-my-name">...</strong></p>
                <input type="text" id="name-input" placeholder="名前を入力">
                <button id="save-name-btn">名前決定</button>
            </div>
            <div class="lobby-section">
                <h3>ルーム作成設定</h3>
                <div class="setting-row">
                    <label>初期手札: <input type="number" id="setting-hand-size" value="10"></label>
                    <label>ライフ: <input type="number" id="setting-life" value="3"></label>
                </div>
                <button id="create-room-btn">ルーム作成</button>
            </div>
            <div class="lobby-section">
                <input type="text" id="join-room-input" placeholder="IDを入力">
                <button id="join-room-btn">参戦する</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <h2 style="text-align: center;">ルームID: <span id="display-room-id"></span></h2>
            <div id="player-status-area"></div>
            
            <div id="board-area">
                <div class="area-box" style="background: #e8f5e9;">
                    <div style="text-align:center; font-weight:bold; margin-bottom:10px;">山 / 捨て札</div>
                    <div style="display:flex; justify-content:center; gap:15px;">
                        <div id="deck-pile" class="pile">山札</div>
                        <div id="discard-pile" class="pile">-</div>
                    </div>
                </div>
                <div id="public-area" class="area-box"></div>
            </div>

            <div id="action-bar">
                <div id="my-hand-container" style="margin-bottom:15px; min-height:80px;"></div>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button id="btn-melt">メルト</button>
                    <button id="btn-attach">付ける</button>
                    <button id="btn-discard">1枚捨てる</button>
                </div>
                <p id="system-msg" style="color:#8b0000; font-weight:bold; margin-top:10px;"></p>
                <button id="start-btn" class="hidden">ゲーム開始（ホスト）</button>
            </div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
