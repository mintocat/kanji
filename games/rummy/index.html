<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .lobby-section { margin: 20px auto; padding: 20px; border: 2px solid #333; border-radius: 8px; max-width: 400px; background: #f9f9f9; text-align: center; }
        .setting-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .setting-row input { width: 60px; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1 style="text-align: center;">漢字ラミー</h1>

        <div id="lobby-ui">
            <div class="lobby-section">
                <p>現在の名前: <strong id="lobby-my-name">未設定</strong></p>
                <input type="text" id="name-input" placeholder="あなたの名前を入力">
                <button id="save-name-btn">決定</button>
            </div>

            <div class="lobby-section">
                <h3>自分で部屋を作る</h3>
                <div class="setting-row">
                    <label>初期手札の枚数:</label>
                    <input type="number" id="setting-hand-size" value="10" min="5" max="20">
                </div>
                <div class="setting-row">
                    <label>初期ライフ数:</label>
                    <input type="number" id="setting-life" value="3" min="1" max="10">
                </div>
                <button id="create-room-btn" style="margin-top: 10px;">新しいルームを作成</button>
            </div>

            <div class="lobby-section">
                <h3>友達の部屋に入る</h3>
                <input type="text" id="join-room-input" placeholder="ルームIDを入力">
                <button id="join-room-btn">ルームに入る</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <h2 style="text-align: center;">ルームID: <span id="display-room-id"></span></h2>
            <p style="text-align: center;">参加者待ち、またはゲーム進行画面がここに入ります。</p>
            </div>
    </div>
    
    <script type="module" src="./script.js"></script>
    <script type="module" src="./kanji_logic.js"></script> </body>
</html>
