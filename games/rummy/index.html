<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        #game-board { display: grid; grid-template-columns: 200px 1fr; gap: 20px; margin-top: 20px; }
        .area { border: 2px solid #8b0000; border-radius: 8px; padding: 10px; background: #fffaf0; }
        
        /* 公開エリア */
        #public-area { min-height: 200px; display: flex; flex-wrap: wrap; gap: 10px; }
        .melted-kanji { 
            width: 60px; height: 60px; background: white; border: 2px solid #333; 
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            cursor: pointer; position: relative;
        }
        .melted-kanji.selected { border-color: #ff4500; box-shadow: 0 0 10px #ff4500; }

        /* 山札・捨て札 */
        #field-center { display: flex; gap: 20px; justify-content: center; align-items: center; margin-bottom: 20px; }
        .card-pile { width: 80px; height: 110px; border: 2px solid #8b0000; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; background: white; }
        .deck-back { background: #8b0000; color: white; }

        /* 手札 */
        #my-hand { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; padding: 15px; background: #eee; border-radius: 10px; }
        .seed-card { 
            width: 50px; height: 70px; background: white; border: 1px solid #999; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer;
            user-select: none;
        }
        .seed-card.selected { background: #ffcccc; border-color: #ff0000; transform: translateY(-10px); }

        #action-panel { text-align: center; margin-top: 10px; }
        .status-bar { display: flex; justify-content: space-between; padding: 5px 20px; background: #333; color: white; border-radius: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>漢字ラミー</h1>

        <div id="lobby-ui">
            <div class="lobby-section">
                <h3>ルーム設定</h3>
                <label>初期手札枚数: <input type="number" id="start-cards" value="10" min="3" max="15"></label><br>
                <label>ライフ数: <input type="number" id="start-lifes" value="3" min="1" max="5"></label><br>
                <button id="create-room-btn">ルームを作成</button>
            </div>
            <div class="lobby-section">
                <input type="text" id="join-room-input" placeholder="ルームID">
                <button id="join-room-btn">入室</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <div class="status-bar">
                <div>ルーム: <span id="display-room-id"></span></div>
                <div>ライフ: <span id="my-life">❤️x3</span></div>
                <div>手札: <span id="card-count">0</span>枚</div>
            </div>

            <div id="field-center">
                <div id="deck" class="card-pile deck-back">山札</div>
                <div id="discard-pile" class="card-pile">空</div>
            </div>

            <h3>公開エリア (メルトされた漢字)</h3>
            <div id="public-area" class="area"></div>

            <div id="action-panel">
                <button id="melt-btn" disabled>メルト</button>
                <button id="attach-btn" disabled>付ける</button>
                <button id="discard-btn" disabled>1枚捨てる</button>
                <p id="system-msg" style="color: #8b0000; font-weight: bold;"></p>
            </div>

            <div id="my-hand"></div>
        </div>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
