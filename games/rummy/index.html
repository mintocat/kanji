<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字ラミー - 漢の遊戯</title>
    <link rel="stylesheet" href="style.css"> <style>
        @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap');
        :root { --bg: #f5f2e9; --ink: #1a1a1a; --wood: #dcc8a0; --accent: #8e2b12; }
        body { background-color: var(--bg); color: var(--ink); font-family: 'Klee One', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 90%; max-width: 800px; text-align: center; padding-top: 50px; }
        .screen.active { display: block; }
        .box { background: white; padding: 30px; border: 2px solid var(--ink); border-radius: 8px; box-shadow: 5px 5px 0px var(--ink); margin-bottom: 20px;}
        input { font-family: inherit; font-size: 1.2rem; padding: 10px; width: 200px; border: 1px solid #ccc; text-align: center; margin: 10px; }
        button { font-family: inherit; font-size: 1.1rem; padding: 10px 25px; background: var(--ink); color: white; border: none; cursor: pointer; border-radius: 4px; margin: 5px; }
        button:hover { background: var(--accent); }
        .btn-home { background: #666; }
        
        /* ゲーム画面用 */
        .status-bar { display: flex; justify-content: space-between; background: var(--ink); color: white; padding: 10px 20px; margin-bottom: 10px; border-radius: 5px; }
        .area { margin: 15px 0; padding: 15px; border: 1px solid #999; background: rgba(255,255,255,0.4); min-height: 100px; border-radius: 8px; position: relative; }
        .area-label { position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 0 10px; font-weight: bold; font-size: 0.9rem; }
        .tile-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .tile { width: 45px; height: 65px; background: var(--wood); border: 1px solid #666; border-bottom: 4px solid #8d7a50; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; border-radius: 3px; }
        .tile.selected { background: white; border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .meld-box { display: inline-flex; flex-direction: column; align-items: center; background: white; border: 1px solid var(--ink); margin: 5px; }
        #game-log { font-size: 0.8rem; height: 60px; overflow-y: auto; background: #eee; padding: 5px; margin-top: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="screen-lobby" class="screen active">
        <h1>漢字ラミー</h1>
        <div class="box">
            <input type="text" id="input-name" placeholder="名前を入力" maxlength="8">
            <div style="margin-top:20px;">
                <button id="btn-to-host">部屋を作る</button>
                <button id="btn-to-join">部屋に入る</button>
            </div>
        </div>
        <button class="btn-home" onclick="location.href='../index.html'">ホームへ戻る</button>
    </div>

    <div id="screen-host" class="screen">
        <h2>部屋の設定</h2>
        <div class="box">
            <p>初期手札の枚数</p>
            <input type="number" id="input-hand-size" value="7" min="3" max="14">
            <br>
            <button id="btn-create-exec">対局開始</button>
            <button class="btn-home" id="btn-host-back">戻る</button>
        </div>
    </div>

    <div id="screen-join" class="screen">
        <h2>部屋に入る</h2>
        <div class="box">
            <input type="text" id="input-room-id" placeholder="3桁のID" maxlength="3">
            <br>
            <button id="btn-join-exec">入室</button>
            <button class="btn-home" id="btn-join-back">戻る</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-bar">
            <div id="display-room-id">ID: ---</div>
            <div id="display-turn">--- の番</div>
            <div id="display-deck">山札: --</div>
        </div>
        <div class="area"><div class="area-label">場</div><div id="table-tiles" class="tile-list"></div></div>
        <div class="area"><div class="area-label" id="player-label">自分の手札</div><div id="hand-tiles" class="tile-list"></div></div>
        <div class="controls">
            <button id="btn-draw">山札を引く</button>
            <button id="btn-meld" disabled>役を作る</button>
            <button id="btn-discard" disabled>1枚捨てる</button>
        </div>
        <div id="game-log"></div>
    </div>

    <script src="kanji_logic.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
