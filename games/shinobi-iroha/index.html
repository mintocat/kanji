<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>現代版・忍びいろは解読戦 - 漢字遊戯門</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        body { font-family: "Sawarabi Mincho", serif; background: #2c2c2c; color: #e0e0e0; text-align: center; }
        #game-container { max-width: 950px; margin: 0 auto; padding: 20px; position: relative; }
        
        /* 画面切り替え用のスタイル */
        .hidden { display: none !important; }

        /* ロビー画面 */
        #lobby-ui { margin-top: 20px; }
        .lobby-section { margin: 20px auto; padding: 20px; max-width: 500px; border: 1px solid #8b0000; background: rgba(139, 0, 0, 0.1); border-radius: 8px; }
        #player-list-area { margin-bottom: 20px; font-size: 0.9rem; }
        .player-tag { display: inline-block; background: #8b0000; color: white; padding: 2px 8px; border-radius: 15px; margin: 2px; }

        /* ゲーム画面 */
        #game-ui { display: flex; flex-direction: column; align-items: center; }
        
        /* 暗号文表示エリア */
        #cipher-area { 
            background: #f5e6c4; padding: 20px; border-radius: 8px; 
            min-height: 80px; width: 100%; max-width: 800px; margin-bottom: 20px; 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }
        .cipher-char { width: 45px; height: 45px; background: white; border: 1px solid #333; display: flex; align-items: center; justify-content: center; border-radius: 4px;}
        .cipher-char svg { width: 40px; height: 40px; }
        .cipher-char.space { background: transparent; border: none; width: 20px; } /* スペース */

        /* 忍び文字対応表（解読メモ欄） */
        #decode-table { 
            display: grid; grid-template-columns: 50px repeat(7, 1fr); 
            gap: 3px; background: #444; padding: 8px; margin: 20px 0; border-radius: 8px; width: 100%; max-width: 800px;
        }
        .cell { background: #fff; color: #000; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; position: relative; border: 1px solid #ccc;}
        .header-cell { background: #8b0000; color: white; font-weight: bold; height: 50px; border: none;}
        .cell svg { width: 40px; height: 40px; margin-bottom: 2px; }
        .memo-input { 
            width: 80%; border: 1px solid #8b0000; text-align: center; font-size: 1.1rem; color: #8b0000; font-weight: bold; background: #fffaf0;
            padding: 2px 0; border-radius: 3px;
        }
        .memo-input:focus { background: #ffe4e1; outline: none;}

        /* 入力エリア */
        #input-area { margin-top: 10px; width: 100%; max-width: 500px; border-top: 2px solid #8b0000; padding-top: 20px;}
        #answer-input { font-size: 1.2rem; padding: 8px; width: 70%; border: 2px solid #8b0000; border-radius: 4px; background: #fff; color: #000;}
        #submit-btn { padding: 10px 20px; font-size: 1rem; cursor: pointer; background: #8b0000; color: white; border: none; border-radius: 4px; margin-left: 10px; transition: 0.2s;}
        #submit-btn:hover { background: #a00000; }
        #status-msg { height: 25px; margin-top: 10px; font-weight: bold; color: #ffae00;}

        /* 結果画面（オーバーレイ） */
        #result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        #result-popup { background: white; color: black; padding: 30px; border-radius: 10px; border: 4px solid #8b0000; text-align: center; max-width: 500px;}
        #result-popup h2 { color: #8b0000; margin-top: 0; }
        #correct-answer { font-size: 1.5rem; font-weight: bold; color: #8b0000; background: #eee; padding: 10px; border-radius: 5px; margin: 15px 0;}

        /* スコアボード */
        #score-board {
            position: fixed; right: 20px; top: 80px; width: 150px;
            background: rgba(255,255,255,0.9); border: 2px solid #8b0000; border-radius: 8px;
            padding: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); color: #000;
        }
        #score-board h3 { margin: 0 0 8px 0; font-size: 0.9rem; border-bottom: 1px solid #8b0000; color: #8b0000; text-align: center; }
        .score-item { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.8rem; border-bottom: 1px dotted #ccc; }

        @media (max-width: 1100px) { #score-board { position: static; width: auto; margin: 10px auto; } }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>現代版・忍びいろは解読戦</h1>

        <div id="lobby-ui">
            <div id="name-setup" class="lobby-section">
                <p>現在の名前: <span id="lobby-my-name" style="font-weight:bold; color:#ffae00;">未設定</span></p>
                <input type="text" id="name-input" placeholder="あなたの名前を入力">
                <button id="save-name-btn">名前を決定</button>
            </div>
            
            <div id="room-controls" class="hidden lobby-section">
                <h3>ゲームに参加</h3>
                <div style="margin-bottom:15px;">
                    <button id="create-room-btn">新しいルームを作成</button>
                </div>
                <div>
                    <input type="text" id="join-room-input" placeholder="3桁のルームID">
                    <button id="join-room-btn">ルームに入る</button>
                </div>
            </div>
            <br>
            <button onclick="location.href='../../index.html'">ホームへ戻る</button>
        </div>

        <div id="game-ui" class="hidden">
            <div id="score-board">
                <h3>勝ち数</h3>
                <div id="score-list"></div>
            </div>

            <div id="room-info" style="margin-bottom:10px;">
                ルームID: <span id="display-room-id" style="font-weight:bold; color:#ffae00;">-</span> | 
                名前: <span id="display-my-name" style="font-weight:bold;">未設定</span>
            </div>
            <div id="player-list-area">参加者: <span id="player-list">待機中...</span></div>

            <div id="play-screen">
                <p>下の暗号文を解読し、ひらがなで入力せよ！表は自分用のメモだ。</p>
                
                <div id="cipher-area">
                    </div>

                <h3>【解読メモ表】</h3>
                <p style="font-size:0.8rem; margin:0 0 10px 0; color:#aaa;">(マスをクリックして特定した「かな」を入力できる)</p>
                <div id="decode-table">
                    </div>

                <div id="input-area">
                    <input type="text" id="answer-input" placeholder="解読した文章（ひらがな）">
                    <button id="submit-btn">解答送信</button>
                    <p id="status-msg"></p>
                </div>
            </div>

            <div style="text-align:center; margin-top:20px;">
                <button id="start-btn" class="hidden">新しい暗号を生成（ホストのみ）</button>
            </div>
            
            <hr style="margin-top:30px;">
            <div style="text-align:center; margin-top:10px;">
                <button onclick="location.href='index.html'">ロビーへ戻る</button>
                <button onclick="location.href='../../index.html'">ホームへ戻る</button>
            </div>
        </div>
    </div>

    <div id="result-overlay" class="hidden">
        <div id="result-popup">
            <h2>解読完了！</h2>
            <p id="winner-msg"></p>
            <p>正解の文章：</p>
            <p id="correct-answer"></p>
            <p id="result-vote-msg" style="font-size:0.9rem; color:#666;"></p>
            <button id="next-game-btn">次の暗号へ（投票: <span id="game-vote-count">0</span>）</button>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
